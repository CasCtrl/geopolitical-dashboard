version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: geopolitical-dashboard-db
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: YourPassword123!
      ACCEPT_EULA: Y
      MSSQL_PID: Express
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourPassword123! -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mssql_data:
