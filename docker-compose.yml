version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: geopolitical-dashboard-db
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: ${DB_PASSWORD:-YourPassword123!}
      ACCEPT_EULA: Y
      MSSQL_PID: Express
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${DB_PASSWORD:-YourPassword123!}" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: geopolitical-dashboard-app
    ports:
      - "80:5050"
    env_file:
      - server/.env
    environment:
      NODE_ENV: production
      DB_SERVER: mssql
      DB_PORT: 1433
    depends_on:
      mssql:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - production

volumes:
  mssql_data:
