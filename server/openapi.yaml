openapi: 3.0.3
info:
  title: Geopolitical Dashboard API
  version: 1.1.0
  description: |
    Core backend API for datasets, portfolio analytics support data, reports, health checks,
    and news ingestion.
servers:
  - url: http://localhost:5001
paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive
  /ready:
    get:
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready
        '503':
          description: Service is degraded
  /api/health:
    get:
      summary: API health endpoint
      responses:
        '200':
          description: API health status
  /api/meta:
    get:
      summary: API metadata
      responses:
        '200':
          description: API metadata and OpenAPI location
  /api/compliance:
    get:
      summary: Compliance and policy summary (privacy links, retention, audit endpoints)
      responses:
        '200':
          description: Compliance summary payload
  /api/openapi.yaml:
    get:
      summary: OpenAPI contract
      responses:
        '200':
          description: YAML OpenAPI specification
  /api/admin/metrics:
    get:
      summary: Runtime process and DB metrics (admin)
      responses:
        '200':
          description: Process metrics payload
        '403':
          description: Forbidden
  /api/admin/observability:
    get:
      summary: Request-level observability aggregates (admin)
      responses:
        '200':
          description: Request volume, error rate, latency and route stats
        '403':
          description: Forbidden
  /api/admin/alerts:
    get:
      summary: Active server alerts derived from observability thresholds (admin)
      responses:
        '200':
          description: Active alert list and configured thresholds
        '403':
          description: Forbidden
        '429':
          description: Admin abuse protection triggered
  /api/admin/incidents:
    get:
      summary: Recent incidents with tracing context and severity breakdown (admin)
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Incident timeline and summary
        '403':
          description: Forbidden
        '429':
          description: Admin abuse protection triggered
  /api/admin/audit-trail:
    get:
      summary: Recent admin/release audit events (admin)
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Recent audit trail entries
        '403':
          description: Forbidden
        '429':
          description: Admin abuse protection triggered
  /api/datasets:
    get:
      summary: List datasets
      responses:
        '200':
          description: Dataset list
  /api/assets/{datasetId}:
    get:
      summary: List assets for dataset
      parameters:
        - in: path
          name: datasetId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Asset list
  /api/dependencies/{datasetId}:
    get:
      summary: List country dependencies for dataset
      parameters:
        - in: path
          name: datasetId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dependency list
  /api/countries:
    get:
      summary: List countries with base risk scores
      responses:
        '200':
          description: Country risk baseline list
  /api/portfolio/{datasetId}:
    get:
      summary: Get complete portfolio payload for dataset
      parameters:
        - in: path
          name: datasetId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Portfolio payload
  /api/assets-with-deps/{datasetId}:
    get:
      summary: Get assets with joined dependency details
      parameters:
        - in: path
          name: datasetId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Asset-centric dependency payload
  /api/news:
    get:
      summary: Get filtered world news feed
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: News payload
        '429':
          description: Expensive endpoint abuse protection triggered
  /api/integrations/providers:
    get:
      summary: List available integration providers and connector readiness
      responses:
        '200':
          description: Provider catalog and configuration status
  /api/integrations/portfolio/import:
    post:
      summary: Import portfolio positions from integration providers (Bloomberg, CSV, manual payload)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: Import accepted
        '409':
          description: Artifact version conflict
        '502':
          description: Integration provider fetch failed
  /api/integrations/pipelines/status:
    get:
      summary: Get current automated pipeline source configuration and latest run summary
      responses:
        '200':
          description: Pipeline status payload
  /api/integrations/pipelines/run:
    post:
      summary: Trigger automated source ingestion pipeline (admin role)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: Pipeline run accepted
        '403':
          description: Forbidden
        '409':
          description: Artifact version conflict
  /api/telemetry/frontend-crash:
    post:
      summary: Ingest frontend crash telemetry event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: Telemetry event accepted
  /api/workspace/state/{bucket}:
    get:
      summary: List latest persisted artifacts for a user/workspace bucket
      parameters:
        - in: path
          name: bucket
          required: true
          schema:
            type: string
            enum: [scenarioOutputs, alertConfigs, customThresholds, schedulesHistory, advancedPrefs]
        - in: query
          name: includeDeleted
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Latest versioned artifacts for bucket
        '503':
          description: Database unavailable
  /api/workspace/state/{bucket}/{artifactKey}:
    get:
      summary: Retrieve latest persisted artifact for bucket/key
      parameters:
        - in: path
          name: bucket
          required: true
          schema:
            type: string
            enum: [scenarioOutputs, alertConfigs, customThresholds, schedulesHistory, advancedPrefs]
        - in: path
          name: artifactKey
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest artifact
        '404':
          description: Artifact not found
    put:
      summary: Persist new artifact version with optimistic concurrency
      parameters:
        - in: path
          name: bucket
          required: true
          schema:
            type: string
            enum: [scenarioOutputs, alertConfigs, customThresholds, schedulesHistory, advancedPrefs]
        - in: path
          name: artifactKey
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Artifact version persisted
        '409':
          description: Version conflict
    delete:
      summary: Soft-delete artifact by creating a tombstone version
      parameters:
        - in: path
          name: bucket
          required: true
          schema:
            type: string
            enum: [scenarioOutputs, alertConfigs, customThresholds, schedulesHistory, advancedPrefs]
        - in: path
          name: artifactKey
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artifact deleted
        '404':
          description: Artifact not found
  /api/reports/generate:
    post:
      summary: Generate report metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Generation accepted
        '429':
          description: Expensive endpoint abuse protection triggered
  /api/reports/email:
    post:
      summary: Queue report email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Email queued
        '429':
          description: Expensive endpoint abuse protection triggered
  /api/reports/templates:
    get:
      summary: List report templates
      responses:
        '200':
          description: Templates list
  /api/reports/schedule:
    post:
      summary: Schedule recurring report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Schedule created
        '429':
          description: Expensive endpoint abuse protection triggered
  /api/reports/history:
    get:
      summary: Get report history
      responses:
        '200':
          description: Report history list
