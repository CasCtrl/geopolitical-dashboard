name: Security Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (json)
        run: npm audit --audit-level=high --json > npm-audit.json
        continue-on-error: true

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit.json
          retention-days: 14

      - name: Fail on high/critical vulnerabilities
        run: |
          node -e "
          const fs = require('fs');
          const audit = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
          const high = audit.metadata?.vulnerabilities?.high || 0;
          const critical = audit.metadata?.vulnerabilities?.critical || 0;
          console.log('high:', high, 'critical:', critical);
          if (high > 0 || critical > 0) process.exit(1);
          "
