name: Pipeline Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate required secrets
        run: |
          missing=0
          for value in PIPELINE_SYNC_URL PIPELINE_SYNC_API_KEY; do
            if [ -z "${!value}" ]; then
              echo "Missing required secret: $value"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
        env:
          PIPELINE_SYNC_URL: ${{ secrets.PIPELINE_SYNC_URL }}
          PIPELINE_SYNC_API_KEY: ${{ secrets.PIPELINE_SYNC_API_KEY }}

      - name: Trigger integration pipeline run
        run: |
          curl -sS -f -X POST "$PIPELINE_SYNC_URL" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $PIPELINE_SYNC_API_KEY" \
            -H "x-user-role: admin" \
            -d '{}' > /tmp/pipeline-sync-response.json
          cat /tmp/pipeline-sync-response.json
        env:
          PIPELINE_SYNC_URL: ${{ secrets.PIPELINE_SYNC_URL }}
          PIPELINE_SYNC_API_KEY: ${{ secrets.PIPELINE_SYNC_API_KEY }}
