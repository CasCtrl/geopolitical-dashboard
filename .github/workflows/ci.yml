name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Bundle size budget
        run: npm run perf:budget

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npm run playwright:install

      - name: Build app
        run: npm run build

      - name: Bundle size budget
        run: npm run perf:budget

      - name: Run e2e smoke tests
        run: npm run test:e2e:smoke:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  api-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run API contract tests
        run: npm run test:contract

  db-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: validate
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
          - 1433:1433
        env:
          SA_PASSWORD: YourPassword123!
          ACCEPT_EULA: Y
          MSSQL_PID: Express
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourPassword123! -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    env:
      DB_SERVER: localhost
      DB_DATABASE: master
      DB_USER: sa
      DB_PASSWORD: YourPassword123!
      DB_PORT: 1433

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Wait for MSSQL
        run: |
          node -e "const sql=require('mssql'); const cfg={server:process.env.DB_SERVER,database:process.env.DB_DATABASE,user:process.env.DB_USER,password:process.env.DB_PASSWORD,port:Number(process.env.DB_PORT),options:{trustServerCertificate:true}}; (async()=>{for(let i=0;i<45;i++){try{const p=new sql.ConnectionPool(cfg); await p.connect(); await p.close(); process.exit(0);}catch{await new Promise(r=>setTimeout(r,1000));}} process.exit(1);})()"

      - name: Run DB-backed integration tests
        run: npm run test:integration:db
